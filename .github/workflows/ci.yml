# Verifies `npm run build` on push/PR. Production deploy: Vercel.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    # Run checkout/setup-node JS on Node 24 (stops "Node 20 deprecated" annotations)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      SHOPIFY_STORE_ONE_URL: ${{ secrets.SHOPIFY_STORE_ONE_URL }}
      SHOPIFY_STORE_ONE_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STORE_ONE_ACCESS_TOKEN }}
      SHOPIFY_STORE_ONE_LOCATION_ID: ${{ secrets.SHOPIFY_STORE_ONE_LOCATION_ID }}
      SHOPIFY_STORE_TWO_URL: ${{ secrets.SHOPIFY_STORE_TWO_URL }}
      SHOPIFY_STORE_TWO_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STORE_TWO_ACCESS_TOKEN }}
      SHOPIFY_STORE_TWO_LOCATION_ID: ${{ secrets.SHOPIFY_STORE_TWO_LOCATION_ID }}
      SHOPIFY_STORE_ONE_WEBHOOK_SECRET: ${{ secrets.SHOPIFY_STORE_ONE_WEBHOOK_SECRET }}
      SHOPIFY_STORE_TWO_WEBHOOK_SECRET: ${{ secrets.SHOPIFY_STORE_TWO_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Check required Actions secrets (fail with hint if missing)
        shell: bash
        run: |
          missing=0
          for name in \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            FIREBASE_CLIENT_EMAIL \
            FIREBASE_PRIVATE_KEY \
            FIREBASE_PROJECT_ID
          do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Repository Actions secret '$name' is not set or is empty."
              echo "::error::Add it under Settings → Secrets and variables → Actions (same values as Vercel)."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets present (values not shown)."

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
